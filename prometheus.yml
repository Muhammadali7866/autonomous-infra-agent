global:
  scrape_interval: 5s #every 5 second prometheus fetches the metrics from the apis

scrape_configs:
  - job_name: 'api_replicas' 
    
    dns_sd_configs: # This is our dns service discovery which tells the prometheus to fetch metrics from all the api replicas
      - names:
          - 'api'  
        type: 'A'
        port: 3001
        
    metrics_path: '/health'   # this endpoint will call to get metricsof api
