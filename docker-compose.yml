version: '3.8'

services:
  api:               #1. The API service(Node.js Application)
    build: ./api
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://admin:password@postgres:5432/research_db
      - REDIS_URL=redis://redis:6379

  # 2. Load Balancer service
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80" # Maps laptop port 8080 to Nginx's port 80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  # 3. Monitoring Database service
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090" # we can view the UI at http://localhost:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # 4. Monitoring Dashboard service
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000" # we can view UI at http://localhost:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # 5. Relational Database service
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=research_db

  # 6. Cache serivce
  redis:
    image: redis:alpine
